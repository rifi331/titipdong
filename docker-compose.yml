# TitipDong — deploy manifest for TrueNAS "Install via YAML" (or any docker host).
#
# HOW TO USE:
#   1. Copy this file's contents into TrueNAS Scale → Apps → Custom App → "Install via YAML".
#   2. Replace every __PLACEHOLDER__ below with your real values (search for "__").
#   3. Deploy. First boot auto-creates the admin from ADMIN_EMAIL/ADMIN_PASSWORD.
#   4. Open http://<truenas-ip>:8877 and log in.
#
# If you prefer to inject the admin directly into the DB (skip ADMIN_* env),
# leave ADMIN_EMAIL/ADMIN_PASSWORD empty and insert the user via SQL after first boot.
#
# Placeholders to replace:
#   __DB_PASSWORD__         — strong password for the postgres user (used by both containers)
#   __SESSION_SECRET__      — 64+ char random hex (generate: openssl rand -hex 32)
#   __ADMIN_EMAIL__         — first-boot admin email (or leave empty to inject manually)
#   __ADMIN_PASSWORD__      — first-boot admin password (or leave empty to inject manually)
#   __BASE_URL__            — public URL (e.g. https://app.yourdomain.com) for PWA manifest
#   __OPENAI_API_KEY__      — OpenAI API key to enable receipt scan (empty = feature hidden)

services:
  titipdong:
    image: ghcr.io/rifi331/titipdong:latest
    container_name: titipdong
    restart: unless-stopped
    ports:
      - "8877:8080"                    # host:container — Cloudflare Tunnel points here
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://titipdong:__DB_PASSWORD__@titipdong-db:5432/titipdong?sslmode=disable"
      SESSION_SECRET: "__SESSION_SECRET__"
      ADMIN_EMAIL: "__ADMIN_EMAIL__"            # leave "" to inject admin via SQL instead
      ADMIN_PASSWORD: "__ADMIN_PASSWORD__"      # leave "" to inject admin via SQL instead
      BASE_URL: "__BASE_URL__"
      OPENAI_API_KEY: "__OPENAI_API_KEY__"      # receipt scan uses gpt-4o-mini
      FX_BASE_URL: "https://api.frankfurter.app"
      UPLOADS_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      titipdong-db:
        condition: service_healthy

  titipdong-db:
    image: postgres:16-alpine
    container_name: titipdong-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: titipdong
      POSTGRES_PASSWORD: "__DB_PASSWORD__"
      POSTGRES_DB: titipdong
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titipdong -d titipdong"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  pgdata:
