# TitipDong — full stack for TrueNAS / any docker host.
# Usage:
#   1. Copy .env.example -> .env, fill in secrets.
#   2. docker compose up -d
#   3. Open http://<host>:8080 and log in with ADMIN_EMAIL / ADMIN_PASSWORD.
services:
  app:
    image: ghcr.io/${GHCR_OWNER:-titipdong}/titipdong:latest
    # To build locally instead of pulling from GHCR, comment out `image:` and uncomment:
    # build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://titipdong:${POSTGRES_PASSWORD:-titipdong}@db:5432/titipdong?sslmode=disable"
      SESSION_SECRET: "${SESSION_SECRET}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      BASE_URL: "${BASE_URL:-http://localhost:8080}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FX_BASE_URL: "${FX_BASE_URL:-https://api.frankfurter.app}"
      UPLOADS_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: titipdong
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-titipdong}"
      POSTGRES_DB: titipdong
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titipdong -d titipdong"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  pgdata:
