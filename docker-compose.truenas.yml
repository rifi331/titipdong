# TitipDong — TrueNAS deploy via "Install via YAML" with .env file
#
# WHY THIS APPROACH:
#   TrueNAS "Edit App" loads the YAML textarea empty/blank, so if you ever edit
#   the app via the web UI you risk losing your SESSION_SECRET and other env vars.
#   Storing secrets in a separate .env file (mounted into the container) avoids
#   this problem: editing the YAML in the UI never touches your secrets.
#
# HOW TO USE:
#   1. Create the .env file on your TrueNAS (via shell, NOT in the YAML textarea).
#      See instructions in: scripts/truenas-setup.sh
#   2. Paste the YAML below into TrueNAS → Apps → Custom App → "Install via YAML".
#   3. Deploy.
#
# To edit the app later without losing secrets:
#   - Only edit the YAML in the TrueNAS textarea.
#   - Never put real secrets in that YAML — they live in the .env file only.

services:
  titipdong:
    image: ghcr.io/rifi331/titipdong:latest
    container_name: titipdong
    restart: unless-stopped
    ports:
      - "30000:30000"
    env_file:
      - /mnt/.ix-applications/titipdong.env      # path on TrueNAS host (see setup script)
    environment:
      ADDR: ":30000"
      FX_BASE_URL: "https://api.frankfurter.dev/v1"
      UPLOADS_DIR: "/app/uploads"
    volumes:
      - uploads:/app/uploads

volumes:
  uploads:
