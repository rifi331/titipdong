{{define "title"}}Daftar — TitipDong{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-1">Daftar Akun ✨</h1>
<p class="text-sm text-slate-600 mb-4">Mulai sebagai Buyer. Mau jualan? Bisa ajukan jadi Jastiper nanti.</p>
{{if .error}}<div class="mb-3 rounded-lg bg-red-50 text-red-700 px-3 py-2 text-sm">{{.error}}</div>{{end}}
<form method="post" action="/signup" class="space-y-3 bg-white p-4 rounded-xl shadow-sm">
  <label class="block">
    <span class="text-sm text-slate-600">Nama panggilan</span>
    <input type="text" name="name" value="{{.name}}" required
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
  </label>
  <label class="block">
    <span class="text-sm text-slate-600">Email</span>
    <input type="email" name="email" value="{{.email}}" required
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
  </label>
  <label class="block">
    <span class="text-sm text-slate-600">Password (min. 8 karakter)</span>
    <input type="password" name="password" required minlength="8"
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
  </label>
  <button class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg">Daftar</button>
</form>
<p class="mt-3 text-sm text-slate-600">Sudah punya akun? <a href="/login" class="text-sky-600 underline">Masuk</a></p>
{{end}}
