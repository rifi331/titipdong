{{define "title"}}Masuk — TitipDong{{end}}
{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Masuk 🔑</h1>
{{if .error}}<div class="mb-3 rounded-lg bg-red-50 text-red-700 px-3 py-2 text-sm">{{.error}}</div>{{end}}
<form method="post" action="/login" class="space-y-3 bg-white p-4 rounded-xl shadow-sm">
  <input type="hidden" name="next" value="{{.next}}">
  <label class="block">
    <span class="text-sm text-slate-600">Email</span>
    <input type="email" name="email" value="{{.email}}" required
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
  </label>
  <label class="block">
    <span class="text-sm text-slate-600">Password</span>
    <input type="password" name="password" required
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none">
  </label>
  <button class="w-full bg-sky-500 hover:bg-sky-600 text-white font-semibold py-2.5 rounded-lg">Masuk</button>
</form>
<p class="mt-3 text-sm text-slate-600">Belum punya akun? <a href="/signup" class="text-sky-600 underline">Daftar</a></p>
{{end}}
