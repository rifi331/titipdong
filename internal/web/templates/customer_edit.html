{{define "title"}}Edit Customer — TitipDong{{end}}
{{define "content"}}
{{$c := .customer}}
<h1 class="text-2xl font-bold mb-4">Edit Customer</h1>
<form method="post" action="/app/customers/{{$c.ID}}" class="space-y-3 bg-white p-4 rounded-xl shadow-sm">
  <label class="block">
    <span class="text-sm text-slate-600">Nama</span>
    <input name="name" value="{{$c.Name}}" required
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-sky-500">
  </label>
  <label class="block">
    <span class="text-sm text-slate-600">No. WhatsApp</span>
    <input name="whatsapp" value="{{$c.WhatsApp}}" inputmode="tel"
      class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-sky-500">
  </label>
  <label class="block">
    <span class="text-sm text-slate-600">Catatan</span>
    <textarea name="notes" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:border-sky-500">{{$c.Notes}}</textarea>
  </label>
  <div class="flex gap-2">
    <button class="flex-1 bg-sky-500 text-white py-2 rounded-lg">Simpan</button>
    <a href="/app/customers" class="flex-1 text-center border border-slate-300 py-2 rounded-lg">Batal</a>
  </div>
</form>
<form method="post" action="/app/customers/{{$c.ID}}/delete" class="mt-3"
  onsubmit="return confirm('Hapus customer ini?')">
  <button class="w-full text-rose-600 border border-rose-200 py-2 rounded-lg">Hapus</button>
</form>
{{end}}
